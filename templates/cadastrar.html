<!DOCTYPE html>
<html>
<head>
    <title>Cadastrar Cliente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <h2>Cadastrar Cliente</h2>

    <form method="POST" class="mt-3">

    <input type="text" name="nome" class="form-control mb-2" placeholder="Nome" required>

    <input type="text" name="razaosocial" class="form-control mb-2" placeholder="Razão Social" required>

    <input type="text" name="cnpj" class="form-control mb-2"
           placeholder="CNPJ"
           maxlength="18"
           oninput="formatarCNPJ(this)"
           required>

    <input type="text" name="cpf" class="form-control mb-2"
           placeholder="CPF"
           maxlength="14"
           oninput="formatarCPF(this)">

    <input type="text" name="cidade" class="form-control mb-2" placeholder="Cidade" required>

    <input type="text" name="estado" class="form-control mb-2" placeholder="Estado">

    <input type="text" name="telefone" class="form-control mb-2"
           placeholder="(11) 99999-9999"
           maxlength="15"
           required
           oninput="formatarTelefone(this)">

    <input type="email" name="email" class="form-control mb-3" placeholder="Email" required>

    <button class="btn btn-success">Salvar</button>
    <a href="/clientes" class="btn btn-secondary">Voltar</a>

</form>
</div>
<script>
function formatarTelefone(campo) {
    let v = campo.value.replace(/\D/g, '');

    if (v.length > 11) v = v.slice(0, 11);

    if (v.length > 0) v = '(' + v;
    if (v.length > 3) v = v.slice(0, 3) + ') ' + v.slice(3);
    if (v.length > 10) v = v.slice(0, 10) + '-' + v.slice(10);

    campo.value = v;
}

function formatarCPF(campo) {
    let v = campo.value.replace(/\D/g, '');

    if (v.length > 11) v = v.slice(0, 11);

    if (v.length > 3) v = v.slice(0, 3) + '.' + v.slice(3);
    if (v.length > 6) v = v.slice(0, 7) + '.' + v.slice(7);
    if (v.length > 9) v = v.slice(0, 11) + '-' + v.slice(11);

    campo.value = v;
}

function formatarCNPJ(campo) {
    let v = campo.value.replace(/\D/g, '');

    if (v.length > 14) v = v.slice(0, 14);

    if (v.length > 2) v = v.slice(0, 2) + '.' + v.slice(2);
    if (v.length > 5) v = v.slice(0, 6) + '.' + v.slice(6);
    if (v.length > 8) v = v.slice(0, 10) + '/' + v.slice(10);
    if (v.length > 12) v = v.slice(0, 15) + '-' + v.slice(15);

    campo.value = v;
}
</script>
</body>
</html>
