<!DOCTYPE html>
<html>
<head>
    <title>Editar Cliente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <h1>Editar Cliente</h1>

    <form method="POST">
        Nome:<br>
        <input type="text" name="nome" value="{{ cliente[1] }}"><br><br>

        Telefone:<br>
        <input type="text" name="telefone" value="{{ cliente[2] }}"><br><br>

        Email:<br>
        <input type="text" name="email" value="{{ cliente[3] }}"><br><br>

        <button type="submit">Salvar Alterações</button>
    </form>

</body>
</html>
