<!DOCTYPE html>
<html>
<head>
    <title>Clientes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <h2 class="mb-4">Clientes</h2>

    <a href="/dashboard" class="btn btn-secondary mb-3">Voltar</a>

    <table class="table table-striped">
        <thead>
        <tr>
            <th>Nome</th>
            <th>Telefone</th>
            <th>Email</th>
            <th>Razão Social</th>
            <th>CNPJ</th>
            <th>CPF</th>
            <th>Cidade</th>
            <th>Estado</th>
            <th>Ações</th>
        </tr>
        </thead>
        <tbody>
        {% for cliente in clientes %}
        <tr>
            <td>{{ cliente[1] }}</td>
            <td>{{ cliente[2] }}</td>
            <td>{{ cliente[3] }}</td>
            <td>{{ cliente[4] }}</td>
            <td>{{ cliente[5] }}</td>
            <td>{{ cliente[6] }}</td>
            <td>{{ cliente[7] }}</td>
            <td>{{ cliente[8] }}</td>
            <td>
                <a href="/editar/{{ cliente[0] }}" class="btn btn-warning btn-sm">Editar</a>
                <a href="/excluir/{{ cliente[0] }}" class="btn btn-danger btn-sm">Excluir</a>
                <a href="{{ url_for('clientes.novo_cliente') }}" class="btn btn-success mb-3">
    Novo Cliente
</a>
            </td>
        </tr>
        {% endfor %}
        </tbody>
    </table>
</div>

</body>
</html>
