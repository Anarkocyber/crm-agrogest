<!DOCTYPE html>
<html>
<head>
    <title>Login - AgroGest</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex justify-content-center align-items-center vh-100">

    <div class="card p-4 shadow" style="width: 300px;">
        <h3 class="text-center mb-3">AgroGest</h3>

        <form method="POST">
            <input type="text" name="email" class="form-control mb-2" placeholder="Email">
            <input type="password" name="senha" class="form-control mb-3" placeholder="Senha">

            <button class="btn btn-success w-100">Entrar</button>
        </form>
    </div>

</body>
</html>
