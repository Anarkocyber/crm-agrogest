<!DOCTYPE html>
<html>
<head>
    <title>{{ 'Editar Cliente' if cliente else 'Cadastrar Cliente' }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow p-4">
        <h3 class="mb-3 text-center">
            {{ 'Editar Cliente' if cliente else 'Cadastrar Cliente' }}
        </h3>

        <form method="POST">

            <div class="row">
                <div class="col-md-6">
                    <input type="text" name="nome" class="form-control mb-2"
                           placeholder="Nome"
                           value="{{ cliente[1] if cliente else '' }}" required>
                </div>

                <div class="col-md-6">
                    <input type="text" name="razaosocial" class="form-control mb-2"
                           placeholder="Razão Social"
                           value="{{ cliente[4] if cliente else '' }}" required>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6">
                    <input type="text" name="cnpj" class="form-control mb-2"
                           placeholder="CNPJ"
                           maxlength="18"
                           oninput="formatarCNPJ(this)"
                           value="{{ cliente[5] if cliente else '' }}" required>
                </div>

                <div class="col-md-6">
                    <input type="text" name="cpf" class="form-control mb-2"
                           placeholder="CPF"
                           maxlength="14"
                           oninput="formatarCPF(this)"
                           value="{{ cliente[6] if cliente else '' }}">
                </div>
            </div>

            <div class="row">
                <div class="col-md-6">
                    <input type="text" name="cidade" class="form-control mb-2"
                           placeholder="Cidade"
                           value="{{ cliente[7] if cliente else '' }}" required>
                </div>

                <div class="col-md-6">
                    <input type="text" name="estado" class="form-control mb-2"
                           placeholder="Estado"
                           value="{{ cliente[8] if cliente else '' }}">
                </div>
            </div>

            <input type="text" name="telefone" class="form-control mb-2"
                   placeholder="Telefone"
                   maxlength="15"
                   oninput="formatarTelefone(this)"
                   value="{{ cliente[2] if cliente else '' }}" required>

            <input type="email" name="email" class="form-control mb-3"
                   placeholder="Email"
                   value="{{ cliente[3] if cliente else '' }}" required>

            <div class="d-flex justify-content-between">
                <a href="{{ url_for('clientes.lista_clientes_view') }}" class="btn btn-secondary">
                    Voltar
                </a>

                <button class="btn btn-success">
                    {{ 'Atualizar' if cliente else 'Salvar' }}
                </button>
            </div>

        </form>
    </div>
</div>

<script src="{{ url_for('static', filename='js/mascaras.js') }}"></script>

</body>
</html>
